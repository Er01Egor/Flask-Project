{% extends "base.html" %}

{% block content %}

<style>
        body {
            font-family: Arial, sans-serif;

            background-color: #f9f9f9;
        }
        h1 {
            color: #333;
        }
        h2 {
            color: #333;
            }
        form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        button {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #218838;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
            vertical-align: top;
        }
        th {
            background: #f2f2f2;
        }
    </style>
<h2>Список блюд</h2>
<table>
    <thead>
    <tr>
        <th>Название</th>
        <th>Необходимые продукты</th>
        <th>Описание</th>
    </tr>
    </thead>
    <tbody>
    {% for dish in dishes %}
    <tr>
        <td>{{ dish.name }}</td>
        <td>{{ dish.ingredients or '—' }}</td>
        <td>{{ dish.description or '—' }}</td>
    </tr>
    {% else %}
    <tr>
        <td colspan="3">Пока нет добавленных блюд</td>
    </tr>
    {% endfor %}
    </tbody>
</table>


{% endblock %}
