<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
          crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Smart Kitchen</title>
</head>
<body>
<header>
    <nav class="fixed-top navbar navbar-expand-lg navbar-dark bg-success p-3">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" style="height: 40px;">
        <h1>Smart Kitchen</h1>
        <ul class="main-vab nav nav-underline ms-auto">
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.endpoint == 'index' else '' }}"
                   href="{{ url_for('index') }}">Главная</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.endpoint == 'favourites' else '' }}"
                   href="{{ url_for('favourites') }}">Избранное</a>
            </li>
        </ul>
        <nav>
            {% if current_user.is_authenticated %}
            <a href="/logout">Выйти ({{ current_user.name }})</a>
            {% else %}

            <a href="{{ url_for('index') }}" class="btn btn-primary">Регистрация</a>
            <a href="{{ url_for('index') }}" class="btn btn-info ms-2">Войти</a>
            {% endif %}
        </nav>


    </nav>
</header>
<!-- Begin page content -->
<main role="main" class="container" style="padding-top: 100px;">
    {% block content %}{% endblock %}
</main>
<footer>
    <div class="footer-text">
        <p>&copy; 2026 Smart Kitchen. Все права защищены.</p>
        <p><a href="https://www.flaticon.com/free-icons/refrigerator" title="refrigerator icons">Refrigerator icons
            created by smashingstocks - Flaticon</a></p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
